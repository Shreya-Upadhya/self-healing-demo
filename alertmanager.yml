route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'webhook'

receivers:
  - name: 'webhook'
    webhook_configs:
      - url: 'http://host.docker.internal:5000/webhook'
        send_resolved: true
        ###This file contains the configuration for Alertmanager, which is responsible for handling alerts generated by Prometheus. It defines how incoming alerts are grouped, how frequently notifications are sent, and which receiver should handle them. In this configuration, alerts are grouped by their alert name, delayed briefly to allow related alerts to be combined, repeated at specified intervals if they remain active, and forwarded to a webhook endpoint. The webhook configuration enables Alertmanager to send HTTP POST requests to an external application, allowing automated processing of alert notifications as well as notifications when alerts are resolved.